# Universal service pipeline:
#   image-version → lint → build → security scan → publish to ACR
#   → bootstrap chart in private-charts (if first run)
#   → bump tag in the env-specific values file (if chart already exists)
#
# Per-service workflow has zero variables — everything is derived from
# `${{ github.event.repository.name }}`. Drop this in a new repo:
#
#   name: build-and-deploy
#   on:
#     push:
#       branches: [main, dev]
#     release:
#       types: [published]
#     pull_request: {}
#   jobs:
#     pipeline:
#       uses: idvilnius/gha-workflows/.github/workflows/service-pipeline.yaml@main
#       secrets: inherit
#
# Branch / event → env file bumped + ACR routing:
#   - push to `dev`         → charts/<repo>/envs/dev-values.yaml,  cr0test.azurecr.io
#   - push to `main`        → charts/<repo>/envs/stg-values.yaml,  cr0test.azurecr.io
#   - GitHub `release`      → charts/<repo>/envs/prod-values.yaml, cr0shared.azurecr.io
#
# Rationale: non-prod (dev + stg) lives on aks-test-001 and pulls from cr0test
# (devs have AcrPull there). Only prod runs on-prem and pulls from cr0shared.
#
# The caller's repo must expose five secrets (inherited):
#   ACR_USERNAME,      ACR_PASSWORD       — for cr0shared.azurecr.io (prod only)
#   ACR_TEST_USERNAME, ACR_TEST_PASSWORD  — for cr0test.azurecr.io (dev + stg)
#   CHARTS_REPO_TOKEN                     — PAT with contents:write + pull_requests:write on the chart repo

name: Service pipeline

on:
  workflow_call:
    inputs:
      auto_merge:
        description: 'Auto-merge the bump PR (does not apply to bootstrap PR)'
        type: boolean
        required: false
        default: false
      chart_repo:
        description: 'owner/repo of the Helm chart repo'
        type: string
        required: false
        default: 'idvilnius/private-charts'
      # ── Legacy single-env knobs (e.g. schools-internal) ────────────────
      # New services should leave these empty; the env-specific file is
      # derived from the branch/event. Provide ONLY if you have a single
      # env chart with a hand-picked path different from the default.
      acr_image:
        description: '(Legacy) Override ACR image. Default: cr0shared.azurecr.io/<repo>'
        type: string
        required: false
        default: ''
      chart_file:
        description: '(Legacy) Override values file to bump. Default: charts/<repo>/envs/{branch}-values.yaml'
        type: string
        required: false
        default: ''
      branch_prefix:
        description: '(Legacy) Override bump-PR branch prefix.'
        type: string
        required: false
        default: ''
      lint_step:
        description: 'Shell run by the lint job. Default assumes pnpm + format:check/lint/typecheck scripts.'
        type: string
        required: false
        default: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm format:check
          pnpm lint
          pnpm typecheck
      test_step:
        description: 'Shell run by the test job. Default is a no-op (DB-bound tests belong in a separate workflow).'
        type: string
        required: false
        default: 'echo "Tests run locally or in a separate workflow."'
      build_step:
        description: 'Shell run by the build job. Default is `docker build -t cr0shared.azurecr.io/<repo>:<tag> .`'
        type: string
        required: false
        default: ''

jobs:
  ImageVersion:
    name: 🏷 Image version
    uses: idvilnius/gha-workflows/.github/workflows/image-version.yaml@main

  Build:
    name: 🧪 Lint, test, build
    needs: [ImageVersion]
    uses: idvilnius/gha-workflows/.github/workflows/build-env.yaml@main
    with:
      docker_image: ${{ inputs.acr_image != '' && inputs.acr_image || format('{0}/{1}', github.event_name == 'release' && 'cr0shared.azurecr.io' || 'cr0test.azurecr.io', github.event.repository.name) }}
      image_tag: ${{ needs.ImageVersion.outputs.image_version }}
      lint_step: ${{ inputs.lint_step }}
      test_step: ${{ inputs.test_step }}
      build_step: ${{ inputs.build_step != '' && inputs.build_step || format('docker build -t {0}:{1} .', inputs.acr_image != '' && inputs.acr_image || format('{0}/{1}', github.event_name == 'release' && 'cr0shared.azurecr.io' || 'cr0test.azurecr.io', github.event.repository.name), needs.ImageVersion.outputs.image_version) }}

  Security:
    name: 🔐 Security scan
    needs: [ImageVersion, Build]
    uses: idvilnius/gha-workflows/.github/workflows/security.yaml@main
    with:
      docker_image: ${{ inputs.acr_image != '' && inputs.acr_image || format('{0}/{1}', github.event_name == 'release' && 'cr0shared.azurecr.io' || 'cr0test.azurecr.io', github.event.repository.name) }}
      image_tag: ${{ needs.ImageVersion.outputs.image_version }}

  Publish:
    name: 📦 Publish to ACR
    needs: [ImageVersion, Security]
    if: ${{ github.event_name == 'push' || github.event_name == 'release' }}
    uses: idvilnius/gha-workflows/.github/workflows/publish-acr.yaml@main
    with:
      docker_image: ${{ inputs.acr_image != '' && inputs.acr_image || format('{0}/{1}', github.event_name == 'release' && 'cr0shared.azurecr.io' || 'cr0test.azurecr.io', github.event.repository.name) }}
      image_tag: ${{ needs.ImageVersion.outputs.image_version }}
    secrets:
      acr_username: ${{ github.event_name == 'release' && secrets.ACR_USERNAME || secrets.ACR_TEST_USERNAME }}
      acr_password: ${{ github.event_name == 'release' && secrets.ACR_PASSWORD || secrets.ACR_TEST_PASSWORD }}

  EnsureChart:
    name: 🌱 Bootstrap chart if missing
    needs: [ImageVersion, Publish]
    if: ${{ github.event_name == 'push' || github.event_name == 'release' }}
    runs-on: ubuntu-latest
    outputs:
      bootstrapped: ${{ steps.bootstrap.outputs.bootstrapped }}
    steps:
      - name: Checkout chart repo
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.chart_repo }}
          token: ${{ secrets.CHARTS_REPO_TOKEN }}
          fetch-depth: 0

      - name: Bootstrap if missing
        id: bootstrap
        env:
          GH_TOKEN: ${{ secrets.CHARTS_REPO_TOKEN }}
          NAME: ${{ github.event.repository.name }}
          TAG: ${{ needs.ImageVersion.outputs.image_version }}
          CHART_REPO: ${{ inputs.chart_repo }}
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail

          if [ -d "charts/$NAME" ]; then
            echo "Chart charts/$NAME already exists; skipping bootstrap."
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Bootstrap only on push to main. On `dev` or `release` without a
          # chart, fail with a clear message instead of silently doing nothing.
          if [ "$REF" != "refs/heads/main" ]; then
            echo "::error::No chart at charts/$NAME and current ref ($REF) is not refs/heads/main. Push to main first to bootstrap the chart, then dev / release flows will work." >&2
            exit 1
          fi

          if [ ! -d "charts/.template" ]; then
            echo "::error::charts/.template not found in $CHART_REPO. Cannot bootstrap." >&2
            exit 1
          fi

          # K8s-safe name: replace underscores with hyphens (DNS-1123 forbids _)
          # so K8s objects (namespace, Application, Deployment, Service, secrets)
          # and ingress hostnames stay valid even when the GitHub repo name
          # contains underscores. ACR image and chart dir keep the raw NAME.
          K8S_NAME="${NAME//_/-}"

          # kebab-case → camelCase: foo-bar → fooBar
          CAMEL=$(echo "$K8S_NAME" | sed -E 's/-([a-z0-9])/\U\1/g')
          echo "Bootstrapping chart for '$NAME' (k8s name: '$K8S_NAME', camelCase: '$CAMEL', first tag: '$TAG')"

          # 1. Copy chart skeleton
          mkdir -p "charts/$NAME/envs"
          cp charts/.template/Chart.yaml  "charts/$NAME/Chart.yaml"
          cp charts/.template/values.yaml "charts/$NAME/values.yaml"
          for env in dev stg prod test; do
            cp "charts/.template/envs/${env}-values.yaml" "charts/$NAME/envs/${env}-values.yaml"
          done

          # 2. ArgoCD Applications split between two app-of-apps charts:
          #    dev + stg envs → app-of-apps-test (drives aks-test-001)
          #    prod env       → app-of-apps      (drives idvilnius on-prem)

          # Test app-of-apps: dev + stg envs
          for env in dev stg; do
            cp "charts/.template/applications/test/__NAME__-${env}-application.yaml" \
               "applications/app-of-apps-test/templates/${NAME}-${env}-application.yaml"
          done
          printf '\n' >> applications/app-of-apps-test/values.yaml
          cat charts/.template/applications/test/app-of-apps-values-snippet.yaml \
            >> applications/app-of-apps-test/values.yaml

          # Prod app-of-apps: prod env only
          cp "charts/.template/applications/prod/__NAME__-prod-application.yaml" \
             "applications/app-of-apps/templates/${NAME}-prod-application.yaml"
          printf '\n' >> applications/app-of-apps/values.yaml
          cat charts/.template/applications/prod/app-of-apps-values-snippet.yaml \
            >> applications/app-of-apps/values.yaml

          # 4. Substitute placeholders in every newly-touched file
          targets=(
            "charts/$NAME/Chart.yaml"
            "charts/$NAME/values.yaml"
            "charts/$NAME/envs/dev-values.yaml"
            "charts/$NAME/envs/stg-values.yaml"
            "charts/$NAME/envs/prod-values.yaml"
            "charts/$NAME/envs/test-values.yaml"
            "applications/app-of-apps-test/templates/${NAME}-dev-application.yaml"
            "applications/app-of-apps-test/templates/${NAME}-stg-application.yaml"
            "applications/app-of-apps-test/values.yaml"
            "applications/app-of-apps/templates/${NAME}-prod-application.yaml"
            "applications/app-of-apps/values.yaml"
          )
          for f in "${targets[@]}"; do
            # Order matters: substitute __K8S_NAME__ and __CAMEL_NAME__ before
            # __NAME__ so the latter doesn't accidentally swallow them.
            sed -i \
              -e "s|__K8S_NAME__|$K8S_NAME|g" \
              -e "s|__CAMEL_NAME__|$CAMEL|g" \
              -e "s|__NAME__|$NAME|g" \
              -e "s|__FIRST_TAG__|$TAG|g" \
              "$f"
          done

          # 5. Open the bootstrap PR
          BRANCH="bootstrap-$NAME-${GITHUB_SHA::7}"
          git config user.name  "idvilnius-ci"
          git config user.email "ci@idvilnius.lt"
          git checkout -b "$BRANCH"
          git add "charts/$NAME" "applications/app-of-apps" "applications/app-of-apps-test"
          git commit -m "feat: bootstrap $NAME chart"
          git push origin "$BRANCH"

          gh pr create \
            --repo "$CHART_REPO" \
            --base main \
            --head "$BRANCH" \
            --title "feat: bootstrap $NAME chart" \
            --body "Auto-generated chart skeleton for **$NAME**.

          ## Files added
          - \`charts/$NAME/\` — Chart.yaml, values.yaml, envs/{dev,stg,prod,test}-values.yaml
          - \`applications/app-of-apps/templates/$NAME-{dev,stg,prod}-application.yaml\` — ArgoCD Applications
          - \`applications/app-of-apps/values.yaml\` — appended ${CAMEL}{Dev,Stg,Prod} entries

          ## What to fill before merging
          Look at \`charts/$NAME/values.yaml\` for placeholders that need real values:
          - \`app.containerPort\` — the port your container actually listens on
          - \`app.env\` — non-secret env vars (URLs, feature flags)
          - \`app.externalSecret.keys\` — env-var-name → KV-secret-name mapping (also create the KV secrets in \`kv-idvilnius-shared\`)
          - \`app.persistence\` (optional) — uncomment if you need a PVC. **If you do, also uncomment \`app.updateStrategy: Recreate\`** — RollingUpdate deadlocks on RWO PVCs.

          And in each \`envs/*-values.yaml\`:
          - \`app.ingress.hosts[0].host\` — the public hostname for that env

          ## ACR routing (already wired in env files)
          - \`envs/stg-values.yaml\` and \`envs/prod-values.yaml\` →
            \`cr0shared.azurecr.io/$NAME\`
          - \`envs/dev-values.yaml\` and \`envs/test-values.yaml\` →
            \`cr0test.azurecr.io/$NAME\`

          The bootstrap build runs on \`main\`, so the first image tag
          (\`$TAG\`) is in **cr0shared**. It is pre-filled in all three env
          files, but the dev pod will ImagePullBackOff until you push to
          the \`dev\` branch (which will publish \`$NAME:<sha>\` to
          cr0test). That is expected.

          ## After merging
          - **AutoSync is enabled** for all 3 ArgoCD Applications. Pods will create
            namespaces and try to start immediately. They will be Pending or
            CrashLoop until you fill values + KV secrets (and, for dev,
            until your first \`dev\` branch push).
          - DNS: ops needs to add \`<host> A 46.255.213.19\` in Cloudflare and
            internal Neptunas.vplanas.lt — three hostnames per service.
          - ACR pull secrets are auto-replicated cluster-wide:
            - **on-prem idvilnius**: kubernetes-reflector mirrors
              \`default/acr-cr0shared\` into every new namespace.
            - **AKS clusters** (dev/test): node managed identity
              authenticates to ACR — no per-namespace secret needed.

            Nothing manual to do here.
          "

          echo "bootstrapped=true" >> "$GITHUB_OUTPUT"

  BumpChartTag:
    name: 🔖 Bump chart tag
    needs: [ImageVersion, Publish, EnsureChart]
    # Run only when:
    #  - Publish succeeded (image is in ACR), AND
    #  - EnsureChart did not just bootstrap (the bootstrap PR already
    #    carries the tag; bumping again would race with it). When
    #    EnsureChart was skipped (push to dev / release event), result is
    #    'skipped' and bootstrapped is empty — we still want to bump.
    if: |
      always() &&
      needs.Publish.result == 'success' &&
      (needs.EnsureChart.result == 'success' || needs.EnsureChart.result == 'skipped') &&
      needs.EnsureChart.outputs.bootstrapped != 'true' &&
      (
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')) ||
        github.event_name == 'release'
      )
    uses: idvilnius/gha-workflows/.github/workflows/bump-chart-tag.yaml@main
    with:
      chart_repo: ${{ inputs.chart_repo }}
      chart_file: ${{ inputs.chart_file != '' && inputs.chart_file || format('charts/{0}/envs/{1}-values.yaml', github.event.repository.name, github.event_name == 'release' && 'prod' || (github.ref == 'refs/heads/main' && 'stg' || 'dev')) }}
      yaml_path: app.image.tag
      new_tag: ${{ needs.ImageVersion.outputs.image_version }}
      branch_prefix: ${{ inputs.branch_prefix != '' && inputs.branch_prefix || format('bump-{0}-{1}', github.event.repository.name, github.event_name == 'release' && 'prod' || (github.ref == 'refs/heads/main' && 'stg' || 'dev')) }}
      auto_merge: ${{ inputs.auto_merge }}
    secrets:
      gh_token: ${{ secrets.CHARTS_REPO_TOKEN }}
